name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: ${{ matrix.arch }}-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        name: [vulkan, opengl, gles]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - name: vulkan
            make: HAVE_VULKAN=1
          - name: opengl
            make: ""
          - name: gles
            make: FORCE_GLES=1 HAVE_VULKAN=0
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential nasm \
            zlib1g-dev libflac-dev liblzma-dev libzstd-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            libvulkan-dev libshaderc-dev

      - name: Build (${{ matrix.arch }} ${{ matrix.name }})
        run: |
          make clean
          make ${{ matrix.make }} -j$(nproc)

      - name: Verify artifact
        run: |
          test -f yabasanshiro_libretro.so
          file yabasanshiro_libretro.so

      - uses: actions/upload-artifact@v4
        with:
          name: yabasanshiro_libretro_${{ matrix.arch }}_${{ matrix.name }}
          path: yabasanshiro_libretro.so
